services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3300}:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:19002/api/v1
      KMS_API_BASE_URL: http://backend:8000/api/v1
      KMS_AUTH_COOKIE_SECURE: "false"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "19002:8000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      qdrant:
        condition: service_started
      embedding-service:
        condition: service_started
      minio:
        condition: service_started

  celery-worker:
    build:
      context: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: kms
      MYSQL_USER: kms
      MYSQL_PASSWORD: kms
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - ./mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "19200:9200"
    volumes:
      - ./es-data:/usr/share/elasticsearch/data

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "${QDRANT_HOST_PORT:-16333}:6333"
    volumes:
      - ./qdrant-data:/qdrant/storage

  embedding-service:
    build:
      context: ./embedding-service
    ports:
      - "8001:8001"
    environment:
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
      EMBEDDING_LOCAL_MODEL_DIR: ${EMBEDDING_LOCAL_MODEL_DIR:-}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cuda}
      EMBEDDING_USE_FP16: ${EMBEDDING_USE_FP16:-true}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-8}
      EMBEDDING_MAX_LENGTH: ${EMBEDDING_MAX_LENGTH:-2048}
      EMBEDDING_CACHE_DIR: /models/hf
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
      HUGGINGFACE_HUB_CACHE: /models/hf
      TRANSFORMERS_CACHE: /models/hf
    volumes:
      - ./embedding-cache:/models/hf
    gpus: all

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - ./minio-data:/data
